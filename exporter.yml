apiVersion: v1 
kind: Service 
metadata: 
  namespace: monitoring
  name: exporter
spec: 
  selector: 
      name: exporter
  ports: 
    - name: exporter 
      port: 80 
      targetPort: 9100
  type: ClusterIP
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    name: exporter
  name: exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      name: exporter
  template:
    metadata:
      labels:
        name: exporter
    spec:
      containers:
      - name: exporter
        args:
          - '--no-collector.wifi'
          - '--no-collector.hwmon'
          - '--collector.disable-defaults'
          - '--collector.netclass'
          - '--collector.os'
          - '--collector.sockstat'
          - '--collector.stat'
          - '--collector.interrupts'
          - '--collector.tcpstat'
          - '--collector.cpu'
          - '--collector.cpufreq'
          - '--collector.meminfo'
          - '--collector.diskstats'
          - '--collector.filesystem'
          - '--collector.netdev'
          - '--collector.netstat'
          - '--collector.vmstat'
          - '--collector.loadavg'
        # - --path.sysfs=/host/sys
        # - --path.rootfs=/host/root
        #- --collector.filesystem.ignored-mount-points=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/pods/.+)($|/)
        #- --collector.netclass.ignored-devices=^(veth.*)$
        image: ghreg.azurecr.io/exporter
        imagePullPolicy: Always
        ports:
          - containerPort: 9100
            protocol: TCP
        resources:
          limits:
            cpu: 250m
            memory: 180Mi
          requests:
            cpu: 102m
            memory: 180Mi
        volumeMounts:
        - mountPath: /host/sys
          mountPropagation: HostToContainer
          name: sys
          readOnly: true
        - mountPath: /host/root
          mountPropagation: HostToContainer
          name: root
          readOnly: true
        env:
          - name: DB_HOST
            value: "postgres-metrics-svc"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-metrics-credentials
                key: POSTGRES_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-metrics-credentials
                key: POSTGRES_PASSWORD
          - name: DB_NAME
            value: "metrics"
          - name: RECORDS_NUM
            value: "10"
          - name: INTERVAL
            value: "1"
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: POD_SERVICE_ACCOUNT
            valueFrom:
              fieldRef:
                fieldPath: spec.serviceAccountName
      imagePullSecrets:
      - name: ghreg
      volumes:
      - hostPath:
          path: /sys
        name: sys
      - hostPath:
          path: /
        name: root
